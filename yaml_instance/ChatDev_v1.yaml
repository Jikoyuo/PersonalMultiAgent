version: 0.4.0
vars:
  OPENROUTER_KEY: "sk-or-v1-MASUKKAN_KEY_BARU_YANG_AMAN_DI_SINI"
  OPENROUTER_URL: "https://openrouter.ai/api/v1"

graph:
  id: test_1_file_generator
  description: Unit test untuk memastikan agent bisa menulis file ke disk lokal.
  is_majority_voting: false
  start:
    - Host
  nodes:
    - id: Host
      type: human
      config:
        description: 'Ketik perintah sederhana, misal: "Mulai test!"'

    - id: Agent_Penulis
      type: agent
      config:
        provider: openai
        name: openai/gpt-oss-120b:free
        role: >
          Kamu adalah bot DevOps spesialis pembuat file. 
          TUGASMU: Buat script PYTHON MURNI yang membuat folder 'test_folder' dan di dalamnya membuat file 'Hero.jsx' berisi kode React sederhana.
          
          ATURAN SUPER KETAT:
          1. HANYA KELUARKAN KODE PYTHON. TIDAK BOLEH ADA TEKS PEMBUKA ATAU PENUTUP!
          2. JANGAN GUNAKAN FORMAT MARKDOWN (jangan pakai ```python ... ```). Langsung tulis sintaks Python.
          3. Kamu wajib menggunakan os.makedirs dan raw string r''' ... ''' agar aman dari syntax error.
          
          CONTEK TEMPLATE INI PERSIS:
          import os
          os.makedirs('test_folder', exist_ok=True)
          with open('test_folder/Hero.jsx', 'w', encoding='utf-8') as f:
              f.write(r'''
          export default function Hero() {
              return (
                  <div className="bg-gray-900 text-white p-10">
                      <h1 className="text-4xl font-bold">Hello dari Test 1 AI!</h1>
                  </div>
              );
          }
          '''.strip())
          print("TEST 1 BERHASIL! File Hero.jsx telah dibuat.")
        base_url: https://openrouter.ai/api/v1
        api_key: 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
        params:
          temperature: 0.1
          max_tokens: 1000

    - id: Executor
      type: python
      config:
        timeout_seconds: 60

  edges:
    - from: Host
      to: Agent_Penulis
    - from: Agent_Penulis
      to: Executor